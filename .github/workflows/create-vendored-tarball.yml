name: Create Vendored Sources Tarball

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Version tag (e.g., 5.4.5)"
        required: true
        type: string
      mark_prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean
  release:
    types: [published]

permissions:
  contents: write

jobs:
  create-vendored-tarball:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version_tag }}"
            PRERELEASE="${{ inputs.mark_prerelease }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
            PRERELEASE="${{ github.event.release.prerelease }}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Checkout repository at tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.version }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Vendor Rust dependencies
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .cargo vendor

          echo "Vendoring main Rust project"
          pushd rust
          cargo vendor --versioned-dirs ../vendor 2>&1 | tee /tmp/vendor-main.txt
          popd

          echo "Vendoring uniffi-bindgen"
          mkdir -p /tmp/vendor-uniffi
          pushd rust/uniffi-bindgen
          cargo vendor --versioned-dirs /tmp/vendor-uniffi 2>&1 | tee /tmp/vendor-uniffi.txt
          popd

          echo "Merging uniffi vendor deps"
          cp -r /tmp/vendor-uniffi/* vendor/ 2>/dev/null || true

          echo "Creating project-root .cargo/config.toml"
          sed -n '/^To use vendored sources/,$p' /tmp/vendor-main.txt | tail -n +3 > .cargo/config.toml

          # In the packaged source tree, .cargo/config.toml lives at project root.
          # Therefore vendor must be relative to project root, not ../vendor.
          sed -i 's|directory = "../vendor"|directory = "vendor"|g' .cargo/config.toml

          cat .cargo/config.toml
          echo "Vendored crates: $(find vendor -maxdepth 1 -mindepth 1 -type d | wc -l)"

      - name: Vendor Gradle dependencies for Flatpak x86_64 and aarch64
        shell: bash
        run: |
          set -euo pipefail

          sudo mkdir -p /run/build/mages
          sudo chown -R "$(id -u):$(id -g)" /run/build/mages

          export GRADLE_USER_HOME=/run/build/mages/gradle-deps
          rm -rf "$GRADLE_USER_HOME" gradle-deps
          mkdir -p "$GRADLE_USER_HOME"

          JAVAFX_VERSION="$(awk -F'"' '/^javafx = / { print $2; exit }' gradle/libs.versions.toml)"
          COMPOSE_VERSION="$(awk -F'"' '/^composeMultiplatform = / { print $2; exit }' gradle/libs.versions.toml)"

          echo "JavaFX version: ${JAVAFX_VERSION}"
          echo "Compose version: ${COMPOSE_VERSION}"
          echo "Gradle user home: ${GRADLE_USER_HOME}"

          echo "Build normal x86_64 distributable once to populate real project cache"
          ./gradlew :desktopApp:createDistributable \
            --no-daemon \
            --no-configuration-cache \
            --no-build-cache

          echo "Fetch explicit Linux x86_64 and Linux aarch64 JavaFX/Compose classifier artifacts"
          rm -rf /tmp/fetch-project
          mkdir -p /tmp/fetch-project
          cp gradlew /tmp/fetch-project/
          cp -r gradle /tmp/fetch-project/

          cat > /tmp/fetch-project/settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven("https://maven.pkg.jetbrains.space/public/p/compose/dev")
              }
          }

          rootProject.name = "fetch-project"
          EOF

          cat > /tmp/fetch-project/build.gradle.kts <<'EOF'
          plugins {
              id("java")
          }

          val jfxVersion: String by project
          val composeVersion: String by project

          val flatpakOfflineDeps by configurations.creating {
              isCanBeResolved = true
              isCanBeConsumed = false
          }

          dependencies {
              // Compose Desktop uses linux-x64 / linux-arm64 classifier names.
              flatpakOfflineDeps("org.jetbrains.compose.desktop:desktop-jvm-linux-x64:$composeVersion")
              flatpakOfflineDeps("org.jetbrains.compose.desktop:desktop-jvm-linux-arm64:$composeVersion")

              // OpenJFX uses linux / linux-aarch64 classifier names.
              for (platform in listOf("linux", "linux-aarch64")) {
                  for (module in listOf("base", "graphics", "media", "swing")) {
                      flatpakOfflineDeps("org.openjfx:javafx-$module:$jfxVersion:$platform")
                  }
              }
          }

          tasks.register("fetchFlatpakOfflineDeps") {
              doLast {
                  val files = flatpakOfflineDeps.resolve()
                  println("Resolved ${files.size} files")
                  files.sortedBy { it.name }.forEach { println(it.name) }
              }
          }
          EOF

          (
            cd /tmp/fetch-project
            ./gradlew \
              --no-daemon \
              -g "$GRADLE_USER_HOME" \
              -PjfxVersion="$JAVAFX_VERSION" \
              -PcomposeVersion="$COMPOSE_VERSION" \
              fetchFlatpakOfflineDeps
          )

          echo "Now prove that these classifier artifacts are resolvable in offline mode"
          (
            cd /tmp/fetch-project
            ./gradlew \
              --offline \
              --no-daemon \
              -g "$GRADLE_USER_HOME" \
              -PjfxVersion="$JAVAFX_VERSION" \
              -PcomposeVersion="$COMPOSE_VERSION" \
              fetchFlatpakOfflineDeps
          )

          echo "Resolve aarch64 JavaFX via the real javafxplugin metadata-rule path"
          cat > /tmp/force-javafx-aarch64.init.gradle <<'EOF'
          allprojects { p ->
              p.plugins.withId('org.openjfx.javafxplugin') {
                  p.extensions.configure('javafx') { opt ->
                      opt.setPlatform('linux-aarch64')
                  }
              }
          }
          EOF

          echo "Download linux-aarch64 jars the same way Flatpak aarch64 will request them"
          ./gradlew :desktopApp:compileKotlin \
            --no-daemon \
            --no-configuration-cache \
            --no-build-cache \
            -I /tmp/force-javafx-aarch64.init.gradle

          echo "Prove aarch64 JavaFX resolves offline through the plugin path"
          ./gradlew :desktopApp:compileKotlin \
            --offline \
            --no-daemon \
            --no-configuration-cache \
            --no-build-cache \
            -I /tmp/force-javafx-aarch64.init.gradle

          echo "Offline check for actual project on host arch"
          ./gradlew :desktopApp:compileKotlin \
            --offline \
            --no-daemon \
            --no-configuration-cache \
            --no-build-cache

          echo "Copy Gradle cache into source tree"
          cp -a "$GRADLE_USER_HOME" gradle-deps

          echo "Clean build outputs but keep vendored deps"
          ./gradlew clean --no-daemon || true
          rm -rf rust/target desktopApp/build shared/build

          find gradle-deps -name "*.lock" -delete
          rm -rf gradle-deps/daemon gradle-deps/.tmp gradle-deps/kotlin-profile

          echo "Final Gradle cache size:"
          du -sh gradle-deps

      - name: Create fat tarball
        shell: bash
        run: |
          set -euo pipefail

          TARBALL_NAME="mages-${VERSION}-vendored-sources.tar.gz"

          rm -rf package
          mkdir -p package/mages

          git archive --format=tar HEAD | tar -C package/mages -xf -

          cp -a vendor package/mages/
          cp -a .cargo package/mages/
          cp -a gradle-deps package/mages/

          tar -C package -czf "${TARBALL_NAME}" mages

          sha256sum "${TARBALL_NAME}" > "${TARBALL_NAME}.sha256"
          cat "${TARBALL_NAME}.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            mages-${{ steps.version.outputs.version }}-vendored-sources.tar.gz
            mages-${{ steps.version.outputs.version }}-vendored-sources.tar.gz.sha256
